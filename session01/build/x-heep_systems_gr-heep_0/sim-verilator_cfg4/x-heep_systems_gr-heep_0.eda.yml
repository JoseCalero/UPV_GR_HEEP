hooks:
  post_run:
  - cmd:
    - sh
    - -c
    - cat uart0.log
    env: &id001
      FILES_ROOT: ../../..
    name: print_uart_log
  pre_build: []
  pre_run:
  - cmd:
    - sh
    - -c
    - rm -f uart0.log
    env: *id001
    name: remove_uart_log
name: x-heep_systems_gr-heep_0
parameters:
  ASSERTS_OFF:
    datatype: bool
    default: false
    description: Turn off asserts for PULP common cells
    paramtype: vlogdefine
  COMMON_CELLS_ASSERTS_OFF:
    datatype: bool
    default: false
    description: Turn off asserts for PULP common cells
    paramtype: vlogdefine
  JTAG_DPI:
    datatype: int
    default: 0
    description: 'Enables testbench JTAG DIPs. Admitted values: 1|0.

      '
    paramtype: vlogparam
  REMOVE_OBI_FIFO:
    datatype: bool
    description: 'Remove the FIFO between the BUS and the peripherals subsystems

      '
    paramtype: vlogdefine
  USE_EXTERNAL_DEVICE_EXAMPLE:
    datatype: int
    default: 1
    description: 'Enables testbench modules compilation. Admitted values: 1|0.

      '
    paramtype: vlogparam
  USE_UPF:
    datatype: bool
    description: 'Enables simulation with UPF with Modelsim/VCS

      '
    paramtype: vlogdefine
tool_options:
  verilator:
    mode: cc
    verilator_options:
    - --cc
    - --trace
    - --trace-fst
    - --trace-structs
    - --trace-params
    - --trace-max-array 1024
    - --x-assign unique
    - --x-initial unique
    - --exe tb_top.cpp
    - -CFLAGS "-Wall -fpermissive"
    - -LDFLAGS "-pthread -lutil -lelf"
    - -Wall
toplevel: testharness
version: 0.2.1
vpi: []
